<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Report Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a1628;
    color: #e8eaed;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* ── Platform chips ─────────────────────────────── */
  .chips { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }
  .chip {
    padding: 8px 20px; border-radius: 999px; font-size: 14px; font-weight: 600;
    border: 1px solid; background: rgba(255,255,255,0.03);
  }
  .chip.instagram { color: #e1478f; border-color: #a03366; }
  .chip.facebook  { color: #4a90d9; border-color: #2d5a8a; }
  .chip.youtube   { color: #e05252; border-color: #8a2d2d; }
  .chip.linkedin  { color: #4ab08a; border-color: #2d6a52; }

  /* ── Main input card ────────────────────────────── */
  .card {
    background: #10233f; border-radius: 14px; padding: 32px;
    margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.06);
  }
  .card label {
    display: block; font-size: 12px; letter-spacing: 2px;
    color: #8a9bb5; margin-bottom: 12px; font-weight: 600;
  }
  .card input {
    width: 100%; padding: 16px 18px; font-size: 16px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12); background: #0a1628; color: #e8eaed;
    outline: none; transition: border-color 0.2s;
  }
  .card input:focus { border-color: #3b6fd4; }
  .hint { font-size: 13px; color: #6b7c96; margin-top: 10px; }

  button.generate {
    width: 100%; margin-top: 22px; padding: 17px; font-size: 16px; font-weight: 700;
    color: #fff; background: #2456e6; border: none; border-radius: 10px;
    cursor: pointer; transition: background 0.2s;
  }
  button.generate:hover:not(:disabled) { background: #1c47c4; }
  button.generate:disabled { background: #24365a; color: #6b7c96; cursor: not-allowed; }

  /* ── Progress checklist ─────────────────────────── */
  .progress { display: none; }
  .progress.visible { display: block; }
  .step { display: flex; align-items: center; gap: 12px; padding: 11px 4px; font-size: 15px; }
  .step .icon {
    width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .step.done .icon { background: #1d7a45; color: #fff; }
  .step.active .icon { background: transparent; }
  .step.active .icon::after {
    content: ""; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #3b6fd4; border-top-color: transparent;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result & error boxes ───────────────────────── */
  .result-box {
    display: none; background: #10233f; border: 1px solid #1d7a45;
    border-radius: 14px; padding: 28px; text-align: center; margin-bottom: 24px;
  }
  .result-box.visible { display: block; }
  .result-box h2 { font-size: 20px; margin-bottom: 6px; color: #4ade80; }
  .result-box p { color: #8a9bb5; font-size: 14px; margin-bottom: 20px; }
  .result-box a.download {
    display: inline-block; padding: 15px 36px; background: #1d7a45; color: #fff;
    font-weight: 700; font-size: 16px; border-radius: 10px; text-decoration: none;
    transition: background 0.2s;
  }
  .result-box a.download:hover { background: #166437; }

  .error-box {
    display: none; background: #2a1416; border: 1px solid #7a2d2d;
    border-radius: 10px; padding: 16px 20px; color: #f0a0a0;
    font-size: 14px; margin-bottom: 24px;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="chips">
    <span class="chip instagram">&#128248; Instagram</span>
    <span class="chip facebook">&#128101; Facebook</span>
    <span class="chip youtube">&#9654;&#65039; YouTube</span>
    <span class="chip linkedin">&#128188; LinkedIn</span>
  </div>

  <div class="card">
    <label>BRAND WEBSITE URL</label>
    <input type="url" id="websiteUrl" placeholder="https://www.example.com/"
           autocomplete="off" spellcheck="false">
    <div class="hint">We'll automatically find all social accounts from the website</div>
    <button class="generate" id="generateBtn" onclick="startGeneration()">Generate Social Media Report</button>
  </div>

  <div class="card progress" id="progressCard"></div>

  <div class="result-box" id="resultBox">
    <h2 id="resultTitle">Report Ready</h2>
    <p id="resultSubtitle"></p>
    <a class="download" id="downloadLink" href="#" download>&#11015;&#65039; Download PowerPoint Report</a>
  </div>

  <div class="error-box" id="errorBox"></div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   Frontend for the ASYNC JOB SYSTEM.

   Old flow (what the previous index.html expected):
     POST /generate  →  waits minutes  →  gets the full result
   That broke once the backend went async: /generate now returns
   only { job_id } instantly, so the old page read download_url as
   undefined and built literal "/undefined" links.

   New flow (this file):
     1. POST /generate            → get { job_id } immediately
     2. GET  /status/<job_id>     → poll every 2 seconds
        - shows "steps" array as a live checklist
        - status "running" → keep polling
        - status "done"    → show download button (result fields
                              are merged into the same response)
        - status "error"   → show the error message
   ═══════════════════════════════════════════════════════════════ */

let pollTimer = null;

function el(id) { return document.getElementById(id); }

function showError(msg) {
  const box = el("errorBox");
  box.textContent = "\u274C " + msg;
  box.classList.add("visible");
}

function clearUI() {
  el("errorBox").classList.remove("visible");
  el("resultBox").classList.remove("visible");
  el("progressCard").classList.remove("visible");
  el("progressCard").innerHTML = "";
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function renderSteps(steps, finished) {
  const cardEl = el("progressCard");
  cardEl.classList.add("visible");
  cardEl.innerHTML = "";
  steps.forEach((label, i) => {
    const isLast = (i === steps.length - 1);
    const div = document.createElement("div");
    // Last step spins while the job is still running; all show ✓ when finished
    div.className = "step " + ((!finished && isLast) ? "active" : "done");
    div.innerHTML = '<span class="icon">' + ((!finished && isLast) ? "" : "\u2713") + "</span><span>" + label + "</span>";
    cardEl.appendChild(div);
  });
}

async function startGeneration() {
  clearUI();
  const url = el("websiteUrl").value.trim();
  if (!url) { showError("Please enter a website URL"); return; }

  const btn = el("generateBtn");
  btn.disabled = true;
  btn.textContent = "Starting...";

  let jobId;
  try {
    const resp = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ website_url: url })
    });
    const data = await resp.json();
    if (!resp.ok || !data.job_id) {
      throw new Error(data.error || "Could not start the report job");
    }
    jobId = data.job_id;
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = "Generate Social Media Report";
    return;
  }

  btn.textContent = "Generating... (takes 2\u20134 minutes)";
  renderSteps(["Starting up"], false);

  pollTimer = setInterval(async () => {
    let data;
    try {
      const resp = await fetch("/status/" + jobId);
      data = await resp.json();
      // A non-OK response with a JSON error body (e.g. job expired, or
      // the pipeline itself failed) is handled below via data.status /
      // data.error rather than thrown, so the message reaches the user.
    } catch (e) {
      // Transient network hiccup — skip this poll, try again next tick.
      return;
    }

    if (data.steps && data.steps.length > 0) {
      renderSteps(data.steps, data.status === "done");
    }

    if (data.status === "done") {
      clearInterval(pollTimer); pollTimer = null;

      // Guard against the exact failure mode the old page had: never
      // build a link from a missing value.
      if (!data.download_url) {
        showError("Report finished but no download link was returned \u2014 check the server logs.");
      } else {
        el("resultTitle").textContent = "\u2705 Report Ready" + (data.brand ? " \u2014 " + data.brand : "");
        el("resultSubtitle").textContent = "Your PowerPoint report has been generated successfully.";
        el("downloadLink").href = data.download_url;
        el("resultBox").classList.add("visible");
      }
      el("generateBtn").disabled = false;
      el("generateBtn").textContent = "Generate Social Media Report";

    } else if (data.status === "error" || data.error) {
      clearInterval(pollTimer); pollTimer = null;
      showError(data.error || "Something went wrong while generating the report");
      el("generateBtn").disabled = false;
      el("generateBtn").textContent = "Generate Social Media Report";
    }
    // status "starting" / "running" → just keep polling
  }, 2000);
}

// Allow pressing Enter in the input to start
el("websiteUrl").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !el("generateBtn").disabled) startGeneration();
});
</script>
</body>
</html>
